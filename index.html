<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Blocks: Gravity Mode</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-layer"></div>
    
    <div class="game-container">
        <header>
            <div class="header-left">
                <h1>QUANTUM BLOCKS</h1>
                <div class="header-icons">
                    <button id="profile-btn" class="icon-btn">👤</button>
                    <button id="settings-btn" class="icon-btn">⚙️</button>
                </div>
            </div>
            <div class="stats">
                <div class="stat-box">
                    <span class="label">SCORE</span>
                    <span class="value" id="score">0</span>
                </div>
                <div class="stat-box">
                    <span class="label">COMBO</span>
                    <span class="value" id="combo">x1</span>
                </div>
            </div>
        </header>

        <!-- Active Event Banner -->
        <div id="event-banner" class="event-banner hidden">
            <span class="event-icon">⚡</span>
            <span id="event-text">No active events</span>
        </div>

        <main>
            <div id="grid-wrapper">
                <div id="grid-container" class="grid-container">
                    <!-- 10x10 Grid generated by JS -->
                </div>
                <!-- Celebration Popups -->
                <div id="celebration-container"></div>
            </div>
        </main>

        <footer>
            <div id="piece-tray" class="piece-tray">
                <!-- 3 pieces generated by JS -->
                <div class="piece-slot" id="slot-0"></div>
                <div class="piece-slot" id="slot-1"></div>
                <div class="piece-slot" id="slot-2"></div>
            </div>
        </footer>
        
        <!-- Game Over Overlay -->
        <div id="game-over" class="overlay hidden">
            <div class="overlay-content">
                <h2>SYSTEM FAILURE</h2>
                <p>Final Score: <span id="final-score">0</span></p>
                <button id="restart-btn" class="glass-btn">REBOOT GRID</button>
            </div>
        </div>

        <!-- Settings Overlay -->
        <div id="settings-modal" class="overlay hidden">
            <div class="overlay-content settings-content">
                <h2>SYSTEM SETTINGS</h2>
                
                <div class="settings-group">
                    <label>ENVIRONMENT</label>
                    <div class="bg-selector">
                        <button class="bg-btn active" data-bg="bg-forest">Forest</button>
                        <button class="bg-btn" data-bg="bg-gradient">Neon</button>
                        <button class="bg-btn" data-bg="bg-cosmic">Cosmic</button>
                        <button class="bg-btn" data-bg="bg-city">City</button>
                    </div>
                </div>

                <div class="settings-group">
                    <label>BLOCK STYLE</label>
                    <div class="bg-selector">
                        <button class="style-btn active" data-style="neon">Neon Outline</button>
                        <button class="style-btn" data-style="solid">Solid Colors</button>
                    </div>
                </div>

                <div class="settings-group">
                    <label>GAMEPLAY FEATURES</label>
                    <div class="toggle-row">
                        <span>Gravity Mode</span>
                        <label class="switch">
                            <input type="checkbox" id="toggle-gravity" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="toggle-row">
                        <span>Hologram Preview</span>
                        <label class="switch">
                            <input type="checkbox" id="toggle-preview" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>

                <button id="close-settings-btn" class="glass-btn">APPLY & RETURN</button>
            </div>
        </div>

        <!-- Profile / Stats Overlay -->
        <div id="profile-modal" class="overlay hidden">
            <div class="overlay-content profile-content">
                <h2>PLAYER PROFILE</h2>
                
                <div class="stats-box">
                    <h3>HIGHEST SCORE</h3>
                    <div id="high-score-display" class="font-neon">0</div>
                </div>

                <div class="milestones-box">
                    <h3>UNLOCKED MILESTONES</h3>
                    <ul id="milestones-list">
                        <!-- Populated by JS -->
                    </ul>
                </div>

                <button id="close-profile-btn" class="glass-btn">CLOSE</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
